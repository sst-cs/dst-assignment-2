name: Autograde Notebook

on: [push, workflow_dispatch]

jobs:
  grade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout student submission
        uses: actions/checkout@v4

      - name: Checkout hidden tests
        uses: actions/checkout@v4
        with:
          repository: sst-cs/dst-assignment-2-tests
          token: ${{ secrets.HIDDEN_TESTS_TOKEN }}
          path: hidden-tests

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest nbformat nbclient pandas numpy

      - name: DF Shape Test
        id: test-1
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'df_shape'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "df_shape"'
          timeout: 10
          max-score: 1

      - name: DF Describe Test
        id: test-2
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'df_describe'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "df_describe"'
          timeout: 10
          max-score: 1

      - name: Unique Categories Test
        id: test-3
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'unique_categories_count'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "unique_categories_count"'
          timeout: 10
          max-score: 1

      - name: Missing Mask Test
        id: test-4
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'has_missing_mask'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "has_missing_mask"'
          timeout: 10
          max-score: 1

      - name: Discount Filled Test
        id: test-5
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'discount_applied_filled'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "discount_applied_filled"'
          timeout: 10
          max-score: 1

      - name: Gross Cost Array Test
        id: test-6
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'gross_cost_array'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "gross_cost_array"'
          timeout: 10
          max-score: 1

      - name: Net Revenue Column Test
        id: test-7
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'net_revenue_column'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "net_revenue_column"'
          timeout: 10
          max-score: 1

      - name: Category Stats Test
        id: test-8
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'category_stats'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "category_stats"'
          timeout: 10
          max-score: 1

      - name: Payment Pivot Test
        id: test-9
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'payment_pivot'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "payment_pivot"'
          timeout: 10
          max-score: 1

      - name: Premium Orders Test
        id: test-10
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'premium_orders'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "premium_orders"'
          timeout: 10
          max-score: 1

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          DF_SHAPE_RESULTS: "${{steps.test-1.outputs.result}}"
          DF_DESCRIBE_RESULTS: "${{steps.test-2.outputs.result}}"
          UNIQUE_CATEGORIES_COUNT_RESULTS: "${{steps.test-3.outputs.result}}"
          HAS_MISSING_MASK_RESULTS: "${{steps.test-4.outputs.result}}"
          DISCOUNT_APPLIED_FILLED_RESULTS: "${{steps.test-5.outputs.result}}"
          GROSS_COST_ARRAY_RESULTS: "${{steps.test-6.outputs.result}}"
          NET_REVENUE_COLUMN_RESULTS: "${{steps.test-7.outputs.result}}"
          CATEGORY_STATS_RESULTS: "${{steps.test-8.outputs.result}}"
          PAYMENT_PIVOT_RESULTS: "${{steps.test-9.outputs.result}}"
          PREMIUM_ORDERS_RESULTS: "${{steps.test-10.outputs.result}}"
        with:
          runners: test-1,test-2,test-3,test-4,test-5,test-6,test-7,test-8,test-9,test-10
