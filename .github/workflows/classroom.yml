name: Autograde Notebook

on: [push, workflow_dispatch]

jobs:
  grade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout student submission
        uses: actions/checkout@v4

      - name: Checkout hidden tests
        uses: actions/checkout@v4
        with:
          repository: sst-cs/dst-assignment-2-tests
          token: ${{ secrets.HIDDEN_TESTS_TOKEN }}
          path: hidden-tests

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest nbformat nbclient pandas numpy

      - name: DF Shape Test
        id: test-1
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'df_shape'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "df_shape"'
          timeout: 10
          max-score: 1

      - name: DF Describe Test
        id: test-2
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'df_describe'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "df_describe"'
          timeout: 10
          max-score: 1

      - name: Unique Categories Test
        id: test-3
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'unique_categories_count'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "unique_categories_count"'
          timeout: 10
          max-score: 1

      - name: Missing Mask Test
        id: test-4
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'has_missing_mask'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "has_missing_mask"'
          timeout: 10
          max-score: 1

      - name: Discount Filled Test
        id: test-5
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'discount_applied_filled'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "discount_applied_filled"'
          timeout: 10
          max-score: 1

      - name: Gross Cost Array Test
        id: test-6
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'gross_cost_array'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "gross_cost_array"'
          timeout: 10
          max-score: 1

      - name: Net Revenue Column Test
        id: test-7
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'net_revenue_column'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "net_revenue_column"'
          timeout: 10
          max-score: 1

      - name: Category Stats Test
        id: test-8
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'category_stats'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "category_stats"'
          timeout: 10
          max-score: 1

      - name: Payment Pivot Test
        id: test-9
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'payment_pivot'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "payment_pivot"'
          timeout: 10
          max-score: 1

      - name: Premium Orders Test
        id: test-10
        uses: education/autograding-command-grader@v1
        with:
          test-name: 'premium_orders'
          command: 'pytest hidden-tests/tests/test_assignment.py -k "premium_orders"'
          timeout: 10
          max-score: 1

      - name: Package Results
        id: package
        run: |
          # Aggregate results from all 10 tests into a single package
          # Fixed: Access score from the .tests[0].score field as provided by the grader
          SCORE1=$(echo "${{steps.test-1.outputs.result}}" | base64 -d | jq '.tests[0].score // 0')
          SCORE2=$(echo "${{steps.test-2.outputs.result}}" | base64 -d | jq '.tests[0].score // 0')
          SCORE3=$(echo "${{steps.test-3.outputs.result}}" | base64 -d | jq '.tests[0].score // 0')
          SCORE4=$(echo "${{steps.test-4.outputs.result}}" | base64 -d | jq '.tests[0].score // 0')
          SCORE5=$(echo "${{steps.test-5.outputs.result}}" | base64 -d | jq '.tests[0].score // 0')
          SCORE6=$(echo "${{steps.test-6.outputs.result}}" | base64 -d | jq '.tests[0].score // 0')
          SCORE7=$(echo "${{steps.test-7.outputs.result}}" | base64 -d | jq '.tests[0].score // 0')
          SCORE8=$(echo "${{steps.test-8.outputs.result}}" | base64 -d | jq '.tests[0].score // 0')
          SCORE9=$(echo "${{steps.test-9.outputs.result}}" | base64 -d | jq '.tests[0].score // 0')
          SCORE10=$(echo "${{steps.test-10.outputs.result}}" | base64 -d | jq '.tests[0].score // 0')
          
          TOTAL=$((SCORE1 + SCORE2 + SCORE3 + SCORE4 + SCORE5 + SCORE6 + SCORE7 + SCORE8 + SCORE9 + SCORE10))
          
          STATUS="fail"
          if [ "$TOTAL" -eq 10 ]; then STATUS="pass"; fi

          # Create the final package
          JSON="{\"test_name\":\"DST Assignment 2\",\"status\":\"$STATUS\",\"max_score\":10,\"score\":$TOTAL,\"tests\":[{\"name\":\"DST Assignment 2\",\"status\":\"$STATUS\",\"score\":$TOTAL,\"max_score\":10}],\"output\":\"Detailed logs are available in the Actions tab.\"}"
          B64=$(echo -n "$JSON" | base64 -w 0)
          echo "result=$B64" >> $GITHUB_OUTPUT

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          GRADER_RESULTS: "${{steps.package.outputs.result}}"
        with:
          runners: grader
